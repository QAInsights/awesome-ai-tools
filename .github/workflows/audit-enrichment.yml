name: Post-Deploy Enrichment Audit

# Runs daily at 04:30 UTC — 2.5 hours after the Vercel build cron (02:00 UTC).
# Fetches the live enriched-tools.json from production, cross-checks against
# the canonical slug list, and opens a GitHub issue if any tools are missing
# enriched content.
on:
  schedule:
    - cron: '30 4 * * *'
  workflow_dispatch: # allow manual trigger for testing

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (for slugs.json)
        uses: actions/checkout@v4

      - name: Run enrichment audit
        id: audit
        run: python3 .github/scripts/audit_enrichment.py
        env:
          PRODUCTION_URL: https://ai.dosa.dev

      - name: Open GitHub issue if gaps found
        if: steps.audit.outputs.missing_count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const missing     = JSON.parse(process.env.MISSING_JSON);
            const total       = process.env.TOTAL_SLUGS;
            const enrichedUrl = process.env.ENRICHED_URL;
            const today       = new Date().toISOString().slice(0, 10);

            const rows = missing
              .map(t => `| \`${t.slug}\` | ${t.name} | ${t.company} |`)
              .join('\n');

            const body = `## 🔍 Post-Deploy Enrichment Audit — ${today}

            The daily enrichment audit detected **${missing.length} of ${total} tool pages** that are missing enriched content after today's deployment.

            | Slug | Tool Name | Company |
            |------|-----------|---------|
            ${rows}

            ### What this means
            Each missing tool will display its basic README description instead of the full enriched profile (pricing, key features, verdict, tags, etc.).

            ### Next steps
            1. Check that the enrichment pipeline ran successfully in the **enricher repo**.
            2. Verify that [\`enriched-tools.json\`](${enrichedUrl}) on production contains entries for the slugs above.
            3. Confirm the Vercel build completed after the enrichment push.

            > Auto-generated by the [Post-Deploy Enrichment Audit](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) workflow.`;

            // Deduplicate: close any open audit issues from today before creating a new one
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              labels: 'enrichment-gap,automated',
              state: 'open',
            });

            for (const issue of open) {
              await github.rest.issues.update({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: issue.number,
                state:        'closed',
                body:         issue.body + `\n\n> ⚠️ Superseded by a newer audit run on ${today}.`,
              });
            }

            await github.rest.issues.create({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              title:  `[Enrichment Gap] ${missing.length} tool(s) missing enriched data — ${today}`,
              body,
              labels: ['enrichment-gap', 'automated'],
            });
        env:
          MISSING_JSON:  ${{ steps.audit.outputs.missing_json }}
          TOTAL_SLUGS:   ${{ steps.audit.outputs.total_slugs }}
          ENRICHED_URL:  ${{ steps.audit.outputs.enriched_url }}
