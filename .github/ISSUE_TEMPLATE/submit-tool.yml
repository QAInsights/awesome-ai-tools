name: 🛠️ Submit a Tool
description: Suggest a new AI coding tool to be added to the list
title: "[Tool Submission] <Tool Name>"
labels: ["submission", "needs-review"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for contributing to **ai.dosa.dev**! Please fill in the details below.

  - type: input
    id: tool-name
    attributes:
      label: Tool Name
      placeholder: e.g. Cursor
    validations:
      required: true

  - type: input
    id: company
    attributes:
      label: Company / Author
      placeholder: e.g. Anysphere
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: Tool URL
      placeholder: https://
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - AI-Native IDEs & Editors
        - IDE Extensions & Plugins
        - Terminal & CLI Agents
        - AI-Native Terminals
        - Autonomous & Async Agents
        - Browser-Based & App Builders
        - AI Code Review & Security
        - AI Testing & Quality Assurance
        - General-Purpose AI Assistants (with Strong Coding Capability)
        - AI Codebase Knowledge & Generation
        - Developer Productivity & Workflow
        - Editor Platforms with Native AI Features
    validations:
      required: true

  - type: dropdown
    id: pricing
    attributes:
      label: Pricing
      options:
        - Free
        - Freemium
        - Paid
        - Open Source
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Short Description
      description: One or two sentences. What makes this tool worth listing?
      placeholder: e.g. Terminal-native agentic coding tool with MCP support and multi-model switching.
    validations:
      required: true

  - type: input
    id: github
    attributes:
      label: GitHub URL (if open source)
      placeholder: https://github.com/

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have checked this tool is not already listed
          required: true
        - label: The tool is AI-powered and developer-focused
          required: true
        - label: The URL is working and publicly accessible
          required: true